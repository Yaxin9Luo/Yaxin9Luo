name: Update research impact

on:
  schedule:
    - cron: "23 2 * * *"
  workflow_dispatch:
    inputs:
      repo:
        description: "Optional repo to add before updating, in owner/repo form"
        required: false
        type: string
      focus:
        description: "Optional one-line focus for the repo"
        required: false
        type: string
  push:
    paths:
      - ".github/workflows/update-research-impact.yml"
      - "data/research-repos.json"
      - "scripts/update_research_impact.py"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Add repo from manual input
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.repo != '' }}
        env:
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_FOCUS: ${{ inputs.focus }}
        run: python scripts/update_research_impact.py add "$INPUT_REPO" --focus "$INPUT_FOCUS"

      - name: Update README impact stats
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/update_research_impact.py update

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No research impact changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/research-repos.json
          git commit -m "Update research impact stats"
          git push
